<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="description" content="ScriptBox Dashboard">
  <link rel="stylesheet" href="styles/style.css">
  <title>ScriptBox - Dashboard</title>

  <style>
    body { margin:0; overflow:hidden; background:#000814; font-family:Arial,sans-serif; color:white; }
    header, h1 { position:relative; z-index:10; text-align:center; }
    img { position:absolute; top:0; right:0; width:100px; height:100px; z-index:10; }

    .content {
      position:relative;
      z-index:10;
      margin-top:150px;
      text-align:center;
      font-size:24px;
    }
  </style>
</head>

<body>

  <img src="assets/logo.png">

  <header>
    <h1>Welcome to Your ScriptBox Dashboard</h1>
  </header>

  <div class="content">
    You’re all set! Explore your tools, shortcuts, and more.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="styles/hacker_scene.js"></script>

</body>
</html>
